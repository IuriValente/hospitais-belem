<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b00020">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Encontre rápido o hospital de referência mais próximo capaz de atender a emergência em Belém-PA. Não substitui o SAMU 192.">
<title>Emergência Belém — protótipo</title>
<style>
  :root{
    --bg:#ffffff; --fg:#16181d; --muted:#5b626e; --line:#d7dbe2;
    --card:#f5f7fa; --card-fg:#16181d;
    --emerg:#b00020; --emerg-fg:#ffffff;
    --ok:#0a7b34; --warn:#9a5b00; --accent:#0b5cab;
    --focus:#0b5cab; --radius:14px; --tap:56px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0e1014; --fg:#f3f5f8; --muted:#aab2bf; --line:#2a2f38;
           --card:#1a1e25; --card-fg:#f3f5f8; --emerg:#e0264b; --accent:#5aa6ff; --focus:#5aa6ff; }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:18px; line-height:1.45; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:680px; margin:0 auto; padding:0 16px 40px}
  a{color:var(--accent)}
  h1,h2,h3{line-height:1.2}
  h1{font-size:1.4rem; margin:.6em 0 .3em}
  h2{font-size:1.25rem; margin:.2em 0 .5em}
  p{margin:.4em 0}
  .muted{color:var(--muted)}
  .small{font-size:.85rem}

  /* ---- Demo ribbon ---- */
  .demo{
    background:repeating-linear-gradient(45deg,#3a2a00,#3a2a00 12px,#2e2200 12px,#2e2200 24px);
    color:#ffd98a; text-align:center; font-weight:700; font-size:.85rem;
    padding:6px 10px; letter-spacing:.02em;
  }
  /* ---- Sticky 192 header ---- */
  header.bar{
    position:sticky; top:0; z-index:50; background:var(--bg);
    border-bottom:1px solid var(--line); padding:8px 16px;
    display:flex; gap:10px; align-items:center; max-width:680px; margin:0 auto;
  }
  .brand{font-weight:800; font-size:1rem; flex:1; min-width:0}
  .brand small{display:block; font-weight:500; color:var(--muted); font-size:.72rem}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    min-height:var(--tap); padding:10px 16px; border-radius:var(--radius);
    border:2px solid transparent; font-size:1.05rem; font-weight:700;
    text-decoration:none; cursor:pointer; width:100%;
  }
  .btn:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--focus); outline-offset:2px;
  }
  .btn-192{background:var(--emerg); color:var(--emerg-fg); width:auto; padding:10px 18px}
  .btn-192 .n{font-size:1.3rem; font-weight:900}
  .btn-primary{background:var(--accent); color:#fff}
  .btn-ghost{background:transparent; color:var(--fg); border-color:var(--line)}
  .btn-block{width:100%}
  .btn-lg{min-height:64px; font-size:1.15rem}

  /* ---- Category grid ---- */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px}
  .cat{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; text-align:center; background:var(--card); color:var(--card-fg);
    border:2px solid var(--line); border-radius:var(--radius);
    min-height:120px; padding:14px 8px; cursor:pointer; font-weight:700; font-size:1.02rem;
  }
  .cat svg{width:42px; height:42px}
  .cat:active{transform:translateY(1px)}
  .cat-crit{border-color:var(--emerg); background:rgba(176,0,32,.06)}
  .cat-crit svg{color:var(--emerg)}

  /* ---- Cards / panels ---- */
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin:12px 0}
  .hosp{border:2px solid var(--line); border-radius:var(--radius); padding:14px; margin:12px 0; background:var(--card)}
  .hosp.best{border-color:var(--accent)}
  .hosp h3{margin:.1em 0}
  .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
  .row .btn{width:auto; flex:1 1 46%}
  .tag{display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:.85rem; padding:3px 10px; border-radius:999px}
  .tag.open{background:rgba(10,123,52,.15); color:var(--ok)}
  .tag.closed{background:rgba(154,91,0,.18); color:var(--warn)}
  .tag.dist{background:rgba(11,92,171,.12); color:var(--accent)}
  .alert{background:var(--emerg); color:#fff; border-radius:var(--radius); padding:18px; text-align:center}
  .alert .big{font-size:1.6rem; font-weight:900; margin:.2em 0}
  .firstaid{border-left:5px solid var(--ok); padding:6px 0 6px 14px; margin:10px 0}
  .firstaid.dont{border-left-color:var(--emerg)}
  ul{margin:.3em 0; padding-left:1.2em}
  li{margin:.2em 0}
  .back{background:none; border:none; color:var(--accent); font-size:1rem; padding:10px 4px; cursor:pointer; min-height:44px}
  .field{display:block; width:100%; min-height:var(--tap); font-size:1.05rem; padding:10px 12px; border-radius:var(--radius); border:2px solid var(--line); background:var(--bg); color:var(--fg)}
  label{font-weight:700; display:block; margin:10px 0 6px}
  footer{margin-top:24px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:.8rem}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
</style>
</head>

    socorros:{ fazer:["LIGUE 192","Adulto/criança que não consegue tossir, falar nem respirar: faça a manobra de Heimlich (compressões na barriga, por trás)","Bebê com menos de 1 ano: deite-o de bruços sobre o seu braço, com a cabeça mais baixa que o corpo, e dê 5 tapas firmes entre as costas; depois vire-o de barriga para cima e faça 5 compressões com 2 dedos no centro do peito. Repita","Se a pessoa desmaiar, comece a RCP"],
               naoFazer:["NÃO coloque o dedo na garganta às cegas","NÃO dê água, comida nem remédio"] } },
  alergia:{ titulo:"Alergia grave (inchaço, falta de ar)", icone:ICN.alerta, forcaC1:true,
    socorros:{ fazer:["LIGUE 192 imediatamente","Se tiver caneta de adrenalina (epinefrina), aplique na lateral da coxa","Deite a pessoa de costas com as pernas elevadas; se estiver com muita falta de ar, deixe-a sentada"],
               naoFazer:["NÃO deixe a pessoa de pé/sentada se estiver desmaiando","NÃO dê comida ou bebida"] } },
  convulsao:{ titulo:"Convulsão / ataque", icone:ICN.alerta, forcaC1:true,
    socorros:{ fazer:["Proteja a cabeça da pessoa com algo macio","Deite-a de lado quando possível, para não engasgar","Marque a hora de início e LIGUE 192 — com urgência se durar mais de 5 minutos, se repetir, ou se não acordar depois"],
               naoFazer:["NÃO segure a pessoa à força","NÃO coloque NADA na boca (nem colher, dedo ou pano)","NÃO dê água, comida ou remédio durante a crise"] } },
  peconhento:{ titulo:"Picada (escorpião / cobra / aranha)", icone:ICN.peconhento, rotas:["soro_antiveneno","ps_geral"], tox:true,
    confirmar:"Nem todo hospital tem o SORO certo. Ligue 192 ou o Disque-Intoxicação e confirme o soro ANTES de ir. Criança picada por escorpião é prioridade máxima.",
    socorros:{ fazer:["Lave o local com água e sabão","Mantenha a pessoa calma e o membro elevado e imóvel","Anote o horário da picada; se possível, fotografe o animal à distância","Ligue 192 / Disque-Intoxicação"],
               naoFazer:["NÃO faça torniquete/garrote","NÃO corte, NÃO chupe o veneno","NÃO aplique gelo, álcool, borra de café ou qualquer substância","NÃO dê bebida alcoólica"] } },
  infarto:{ titulo:"Dor no peito / possível infarto", icone:ICN.infarto, rotas:["hemodinamica","ps_geral"],
    confirmar:"Dor no peito pode ser infarto e exige hemodinâmica. Ligue 192 — não dirija por conta própria, pode haver parada cardíaca no caminho.",
    socorros:{ fazer:["Pare qualquer esforço; sente ou deite a pessoa","Ligue 192 imediatamente","Afrouxe roupas apertadas"],
               naoFazer:["NÃO dirija sozinho até o hospital se estiver passando mal","NÃO dê remédio por conta própria"] } },
  avc:{ titulo:"Sinais de AVC (boca torta, fraqueza, fala)", icone:ICN.avc, rotas:["avc_tc_neuro","ps_geral"],
    confirmar:"AVC tem janela curta e exige TC. Ligue 192 e informe a HORA EXATA em que os sinais começaram — disponibilidade de trombólise 24h NÃO é garantida; a regulação define o destino.",
    socorros:{ fazer:["Anote a HORA em que os sinais começaram (é decisivo)","Ligue 192 imediatamente","Deite a pessoa com a cabeça levemente elevada"],
               naoFazer:["NÃO dê comida, bebida nem remédio","NÃO espere os sintomas passarem"] } },
  trauma:{ titulo:"Acidente / trauma com impacto", icone:ICN.trauma, rotas:["trauma_referencia","trauma_proxy","ps_geral"],
    confirmar:"Trauma grave precisa de cirurgia, imagem e banco de sangue. Ligue 192 — em politrauma, a regulação define o destino.",
    socorros:{ fazer:["Ligue 192","Estanque sangramentos com pano limpo e pressão","Mantenha a pessoa aquecida e calma"],
               naoFazer:["NÃO mova a vítima se houver suspeita de lesão na coluna/pescoço","NÃO dê comida nem bebida (pode precisar de cirurgia)"] } },
  obstetrica:{ titulo:"Emergência na gravidez / parto", icone:ICN.obstetrica, rotas:["obstetrica_alto_risco","obstetrica","ps_geral"],
    confirmar:"Procure maternidade de referência. Se o parto estiver saindo, NÃO se desloque — ligue 192.",
    socorros:{ fazer:["Ligue 192","Deite a gestante de lado (lado esquerdo)","Anote contrações/sangramento para informar"],
               naoFazer:["NÃO tente acelerar o parto","NÃO dê medicação por conta própria"] } },
  pediatrica:{ titulo:"Emergência com criança", icone:ICN.pediatrica, rotas:["neonatal_pediatrica","ps_geral"],
    confirmar:"Criança piora rápido. Ligue 192. Picada de escorpião em criança = prioridade máxima de soro.",
    socorros:{ fazer:["Ligue 192","Mantenha a criança calma e aquecida","Tenha em mãos peso/idade e o que aconteceu"],
               naoFazer:["NÃO dê remédio sem orientação","NÃO ofereça comida/bebida se houver risco de cirurgia"] } },
  queimadura:{ titulo:"Queimadura grave", icone:ICN.queimadura, rotas:["trauma_referencia","ps_geral"],
    confirmar:"Queimadura no rosto, com fumaça inalada, elétrica/química ou extensa é referência de Centro de Queimados. Ligue 192.",
    socorros:{ fazer:["Resfrie a área com água corrente em temperatura ambiente","Se a queimadura for muito extensa ou em criança/bebê, resfrie por pouco tempo e mantenha o resto do corpo aquecido (evite hipotermia)","Cubra com pano limpo e seco","Ligue 192"],
               naoFazer:["NÃO passe pasta de dente, manteiga, pó de café ou pomada","NÃO estoure bolhas","NÃO remova roupa grudada na pele"] } },
  nao_sei:{ titulo:"Não sei / outro problema", icone:ICN.nao_sei, rotas:["ps_geral"],
    confirmar:"Na dúvida, ligue 192 ou procure o pronto-socorro mais próximo.",
    socorros:{ fazer:["Ligue 192 e descreva o que está acontecendo","Procure o pronto-socorro/UPA mais próximo"],
               naoFazer:["NÃO ignore sinais de gravidade"] } }
};

// Telefone toxicológico nacional (MS) — funciona no PA; CIATOX-PA local a confirmar na curadoria.
const TEL_TOX = { nome:"Disque-Intoxicação (gratuito)", num:"08007226001", exib:"0800 722 6001" };

const RED_FLAGS = [
  "Está desacordada, não responde, ou não está respirando",
  "Engasgo: não consegue falar, tossir ou respirar",
  "Dor forte no peito, falta de ar ou suor frio",
  "Sinais de AVC: boca torta, fraqueza de um lado, fala enrolada (anote a hora!)",
  "Convulsão agora, ou não acorda depois dela",
  "Sangramento intenso que não para com pressão",
  "Alergia grave: inchaço de lábios/língua/garganta, chiado ao respirar",
  "Criança picada por escorpião/cobra, ou picada com vômitos, suor ou falta de ar",
  "Queimadura no rosto, com fumaça inalada, elétrica/química ou muito extensa",
  "Acidente grave, queda de altura, ou suspeita de lesão na coluna/pescoço",
  "Parto saindo agora, ou convulsão/sangramento intenso na gravidez",
  "Pele fria e pálida, confusão ou desmaio (sinais de choque)",
  "Manchas roxas/avermelhadas na pele que não somem ao apertar (ainda mais em criança com febre)"
];

/* ---------------------------- helpers ---------------------------- */
const app = document.getElementById("app");
const state = { categoria:null, pos:null };

function haversineKm(a,b){
  const R=6371, rad=x=>x*Math.PI/180;
  const dLat=rad(b.lat-a.lat), dLng=rad(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2 + Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function fmtKm(k){ return k<1 ? Math.round(k*1000)+" m" : k.toFixed(1).replace(".",",")+" km"; }
function rotaURL(u){ return "https://www.google.com/maps/dir/?api=1&destination="+u.lat+","+u.lng+"&travelmode=driving"; }
// Capacidade pode ser boolean simples (CNES) ou objeto {v,inc,obs} (curadoria de alta complexidade).
function temCap(u, cap){ const c=u.cap&&u.cap[cap]; if(c===true) return true; return !!(c&&typeof c==="object"&&c.v===true); }
function capMeta(u, cap){ const c=u.cap&&u.cap[cap]; return (c&&typeof c==="object")?c:null; }
const ROTA_LABEL = { hemodinamica:"hemodinâmica", avc_tc_neuro:"AVC (TC + neuro)", trauma_referencia:"trauma de referência", obstetrica_alto_risco:"obstetrícia de alto risco", soro_antiveneno:"soro antiveneno" };
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setScreen(html){ app.innerHTML=html; app.focus(); const h=app.querySelector("h1,h2"); if(h){ h.setAttribute("tabindex","-1"); h.focus(); } window.scrollTo(0,0); }

/* ---------------------------- telas ---------------------------- */
function screenHome(){
  const cats = Object.entries(EMERGENCIAS).map(([id,e])=>
    `<button class="cat${e.forcaC1?' cat-crit':''}" data-cat="${id}" aria-label="${esc(e.titulo)}">${e.icone}<span>${esc(e.titulo)}</span></button>`).join("");
  setScreen(`
    <h1>Qual é a emergência?</h1>
    <p class="muted">Toque no tipo de situação. Em risco de vida, ligue <strong>192</strong> antes de sair.</p>
    <div class="grid" role="list">${cats}</div>
    <div class="panel small muted">
      <strong>Aviso:</strong> ferramenta informativa, <strong>não substitui o SAMU 192</strong> nem
      avaliação médica. Os dados podem estar desatualizados — confirme por telefone.
    </div>`);
  app.querySelectorAll(".cat").forEach(b=> b.addEventListener("click",()=>{
    state.categoria=b.dataset.cat;
    const e=EMERGENCIAS[state.categoria];
    if(e&&e.forcaC1) screenCamada1(); else screenRedFlags();
  }));
}

function screenRedFlags(){
  const items = RED_FLAGS.map(f=>`<li>${esc(f)}</li>`).join("");
  setScreen(`
    <button class="back" data-back>← Voltar</button>
    <h2>Antes de tudo: há algum destes sinais?</h2>
    <ul>${items}</ul>
    <div class="row">
      <button class="btn btn-192-screen btn-lg" style="background:var(--emerg);color:#fff" data-redflag="sim">SIM, tem um desses</button>
    </div>
    <div class="row">
      <button class="btn btn-ghost btn-lg" data-redflag="nao">Não / nenhum desses</button>
    </div>`);
  app.querySelector("[data-back]").addEventListener("click", screenHome);
  app.querySelectorAll("[data-redflag]").forEach(b=> b.addEventListener("click",()=>{
    if(b.dataset.redflag==="sim") screenCamada1(); else screenLocate();
  }));
}

function screenCamada1(){
  const e = EMERGENCIAS[state.categoria] || EMERGENCIAS.nao_sei;
  const toxBtn = e.tox
    ? `<a class="btn" style="width:100%;margin-top:8px;background:#fff;color:var(--emerg)" href="tel:${TEL_TOX.num}">☎ ${esc(TEL_TOX.nome)}: ${esc(TEL_TOX.exib)}</a>`
    : "";
  setScreen(`
    <div class="alert" role="alert">
      <div>Situação de risco de vida</div>
      <div class="big">LIGUE 192 AGORA</div>
      <a class="btn btn-192" style="width:100%;background:#fff;color:var(--emerg)" href="tel:192">☎ Ligar 192 (SAMU)</a>
      ${toxBtn}
    </div>
    <p class="muted">Não saia dirigindo por conta própria. A ambulância leva o suporte e a regulação médica define o hospital.</p>
    ${firstAidBlock(e)}
    <button class="back" data-back>← Voltar ao início</button>`);
  app.querySelector("[data-back]").addEventListener("click", screenHome);
}

function firstAidBlock(e){
  const f = e.socorros.fazer.map(x=>`<li>${esc(x)}</li>`).join("");
  const d = e.socorros.naoFazer.map(x=>`<li>${esc(x)}</li>`).join("");
  return `<div class="panel">
    <h3>Primeiros socorros — ${esc(e.titulo)}</h3>
    <div class="firstaid"><strong>Faça:</strong><ul>${f}</ul></div>
    <div class="firstaid dont"><strong>NÃO faça:</strong><ul>${d}</ul></div>
    <p class="small muted">Orientações de primeiros socorros revisadas clinicamente. Em dúvida, siga sempre o 192.</p>
  </div>`;
}

function screenLocate(){
  const opts = BAIRROS.map((b,i)=>`<option value="${i}">${esc(b.nome)}</option>`).join("");
  setScreen(`
    <button class="back" data-back>← Voltar</button>
    <h2>Onde você está?</h2>
    <p class="muted">Usamos sua localização só neste aparelho, para achar a unidade mais próxima. Nada é enviado pela internet.</p>
    <div class="row"><button class="btn btn-primary btn-lg" data-geo>📍 Usar minha localização</button></div>
    <div class="panel">
      <label for="bairro">Ou escolha seu bairro / zona</label>
      <select id="bairro" class="field">${opts}</select>
      <div class="row"><button class="btn btn-ghost btn-lg" data-bairro>Continuar com este bairro</button></div>
    </div>
    <p id="geomsg" class="small muted" role="status"></p>`);
  app.querySelector("[data-back]").addEventListener("click", screenRedFlags);
  app.querySelector("[data-bairro]").addEventListener("click",()=>{
    const i=+app.querySelector("#bairro").value; const b=BAIRROS[i];
    state.pos={lat:b.lat,lng:b.lng,fonte:"bairro: "+b.nome}; screenResults();
  });
  app.querySelector("[data-geo]").addEventListener("click", pedirGeo);
}

function pedirGeo(){
  const msg=app.querySelector("#geomsg");
  if(!navigator.geolocation){ msg.textContent="Este aparelho não fornece localização — escolha o bairro acima."; return; }
  msg.textContent="Obtendo sua localização…";
  navigator.geolocation.getCurrentPosition(
    p=>{ state.pos={lat:p.coords.latitude,lng:p.coords.longitude,fonte:"GPS"}; screenResults(); },
    ()=>{ msg.textContent="Não foi possível obter sua localização. Escolha seu bairro/zona acima."; },
    { enableHighAccuracy:true, timeout:9000, maximumAge:60000 }
  );
}

function screenResults(){
  const e = EMERGENCIAS[state.categoria] || EMERGENCIAS.nao_sei;
  const rotas = e.rotas || ["ps_geral"];
  const geo = u=> u.lat!=null && u.lng!=null;

  // Cascata: percorre as rotas (referência -> base -> ps_geral), acumulando até 3
  // unidades sem repetir. "ref" = veio da 1a rota e não é ps_geral (capacidade especializada).
  const vistos = new Set();
  const resultados = [];
  let achouRef = false;
  for(let r=0; r<rotas.length && resultados.length<3; r++){
    const cap = rotas[r];
    const ehRef = (r===0 && cap!=="ps_geral");
    UNIDADES
      .filter(u=> geo(u) && temCap(u,cap) && !vistos.has(u))
      .map(u=> ({u, dist:haversineKm(state.pos,u)}))
      .sort((a,b)=> a.dist-b.dist)
      .forEach(x=>{ if(resultados.length<3){ resultados.push({u:x.u, dist:x.dist, cap, ref:ehRef}); vistos.add(x.u); if(ehRef) achouRef=true; } });
  }

  const temRota = rotas[0] && rotas[0]!=="ps_geral";
  const semRef = temRota && !achouRef;
  const cards = resultados.map((x,i)=> hospCard(x.u, x.dist, i===0, x)).join("");
  const tox = e.tox ? `<a class="btn btn-192" style="width:100%;margin-top:8px" href="tel:${TEL_TOX.num}">☎ ${esc(TEL_TOX.nome)}: ${esc(TEL_TOX.exib)}</a>` : "";

  setScreen(`
    <button class="back" data-back>← Voltar</button>
    <h2>${esc(e.titulo)}</h2>
    <a class="btn btn-192" style="width:100%" href="tel:192">☎ LIGAR 192 (SAMU) — faça isso primeiro</a>
    ${tox}
    <div class="panel" style="border-color:var(--warn)">
      <strong>⚠ Confirme antes de ir:</strong> ${esc(e.confirmar)}
    </div>
    ${semRef?`<p class="muted small">Nenhuma <strong>unidade de referência</strong> com localização foi encontrada por perto — mostrando o pronto-socorro mais próximo como retaguarda. A regulação do 192 define o destino.</p>`:""}
    <p class="muted small">A partir de ${esc(state.pos.fonte)} · distância <strong>em linha reta</strong>.</p>
    ${cards || "<p>Nenhuma unidade encontrada com localização para esta busca. Ligue 192.</p>"}
    ${firstAidBlock(e)}`);
  app.querySelector("[data-back]").addEventListener("click", screenLocate);
}

function u_aberto(u){ return u.h24===true; } // demo: referências 24h; horário real virá do dataset

function hospCard(u,dist,best,info){
  info = info || {};
  const aberto = u_aberto(u);
  const tel = u.tel ? `<a class="btn btn-primary" href="tel:${esc(u.tel)}">☎ Ligar hospital</a>`
                    : `<button class="btn btn-ghost" disabled title="Telefone não cadastrado no CNES">☎ Sem telefone</button>`;
  const horario = aberto
    ? `<span class="tag open">✓ Aberto 24h (CNES)</span>`
    : `<span class="tag closed">• Confirme o horário</span>`;
  const rmb = u.rmb ? `<span class="tag closed">Região Metropolitana</span>` : "";
  // Selo de referência + aviso de incerteza da capacidade curada
  let refTag = "", incAviso = "";
  if(info.ref){
    refTag = `<span class="tag open">✓ Referência: ${esc(ROTA_LABEL[info.cap] || "especializada")}</span>`;
    const m = capMeta(u, info.cap);
    if(m && (m.inc==="media" || m.inc==="alta")){
      incAviso = `<p class="small" style="color:var(--warn);margin:6px 0">⚠ <strong>Capacidade não confirmada em tempo real${m.inc==="alta"?" — incerteza alta":""}.</strong> ${esc(m.obs||"Confirme pelo 192 antes de ir.")}</p>`;
    }
  }
  return `<div class="hosp ${best?'best':''}">
    ${best?'<span class="tag dist">Mais próximo</span> ':''}${refTag}
    <h3>${esc(u.nome)}</h3>
    <p class="muted">${esc(u.bairro)}${u.tipo?` · ${esc(u.tipo)}`:''}</p>
    <div>
      ${horario}
      <span class="tag dist">↦ ${fmtKm(dist)} em linha reta</span>
      ${rmb}
    </div>
    ${incAviso}
    <div class="row">
      <a class="btn btn-primary" href="${rotaURL(u)}" target="_blank" rel="noopener">🗺 Traçar rota</a>
      ${tel}
    </div>
    <p class="small muted">Dado do CNES — confirme por telefone / 192 antes de ir.</p>
  </div>`;
}

/* ---------------------------- footer ---------------------------- */
document.body.insertAdjacentHTML("beforeend",
  `<footer class="wrap">
     <p><strong>Emergência Belém — protótipo acadêmico.</strong> Não substitui o SAMU 192 nem avaliação médica.
     Em emergência, ligue 192. Dados: ${esc(DATA_STAMP)}.</p>
     <p>Sua localização e a emergência escolhida ficam só neste aparelho.</p>
   </footer>`);

screenHome();
</script>
</body>
</html>
